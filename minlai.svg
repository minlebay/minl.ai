<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#4c1d95" stroke-width="0.5" opacity="0.6"/>

  <!-- Orbit ellipse (tilted) -->
  <ellipse cx="32" cy="32" rx="22" ry="9"
           fill="none" stroke="#a78bfa" stroke-width="1.8"
           stroke-dasharray="4 2" opacity="0.85"
           transform="rotate(-15 32 32)"/>

  <!-- Central planet -->
  <circle cx="32" cy="32" r="7" fill="#7c3aed"/>
  <circle cx="32" cy="32" r="7" fill="url(#planetGrad)"/>

  <!-- Orbiting satellite dot -->
  <circle cx="51" cy="28" r="3.5" fill="#c4b5fd" opacity="0.95"/>
  <!-- Satellite glow -->
  <circle cx="51" cy="28" r="5.5" fill="#a78bfa" opacity="0.2"/>

  <!-- Star dots (background) -->
  <circle cx="12" cy="14" r="1" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="50" cy="10" r="0.8" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="18" cy="50" r="0.8" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="54" cy="48" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="8"  cy="38" r="0.7" fill="#e2e8f0" opacity="0.3"/>

  <!-- Gradients -->
  <defs>
    <radialGradient id="planetGrad" cx="40%" cy="35%">
      <stop offset="0%"   stop-color="#c4b5fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="1"/>
    </radialGradient>
  </defs>
</svg>
